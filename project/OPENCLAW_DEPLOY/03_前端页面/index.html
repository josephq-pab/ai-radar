<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>对公 AI 雷达站 - 首页总览</title>
  <style>
    :root { --primary:#1890ff; --text:#333; --text2:#666; --border:#d9d9d9; --bg:#f0f2f5; --panel:#fff; --head:#f8f8f8; --radius:8px; --shadow:0 2px 8px rgba(0,0,0,.08); }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
    .layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
    .sidebar{background:#0f2747;color:#fff;padding:20px 16px}
    .brand{font-size:20px;font-weight:700;margin-bottom:8px}
    .brand-sub{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:24px}
    .nav-title{font-size:12px;color:rgba(255,255,255,.58);margin:12px 0 8px}
    .nav-item{display:block;padding:9px 12px;border-radius:6px;color:#fff;text-decoration:none;margin-bottom:6px;background:rgba(255,255,255,.04)}
    .nav-item.active{background:rgba(24,144,255,.28)}
    .main{padding:24px}
    .panel,.kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel{padding:16px 20px;margin-bottom:16px}
    .page-title{margin:0;font-size:24px;font-weight:600}
    .page-sub{margin-top:8px;color:var(--text2)}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .kpi-card{padding:16px}
    .kpi-label{font-size:12px;color:var(--text2)}
    .kpi-value{font-size:26px;font-weight:700;margin-top:8px}
    .section{font-size:18px;font-weight:600;margin:0 0 12px}
    .twocol{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead th{background:var(--head);color:var(--text2);text-align:left;padding:12px;border-bottom:1px solid var(--border)}
    tbody td{padding:12px;border-bottom:1px solid #eee;white-space:nowrap}
    td.num,th.num{text-align:right}
    .card{border:1px solid var(--border);border-radius:8px;padding:12px;background:#fff;margin-bottom:10px}
    .meta{font-size:12px;color:var(--text2);margin-bottom:6px}
    .mono{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:12px;max-height:360px;overflow:auto}
    .quick-links{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .quick-link{display:block;padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);text-decoration:none}
    .quick-link strong{display:block;margin-bottom:4px}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">对公 AI 雷达站</div>
      <div class="brand-sub">首页总览版</div>
      <div class="nav-title">主链路</div>
      <a class="nav-item active" href="./index.html">首页总览</a>
      <a class="nav-item" href="./deposit.html">存款深案例</a>
      <a class="nav-item" href="./loan.html">贷款深案例</a>
      <a class="nav-item" href="./tracking.html">重点事项跟踪</a>
      <div class="nav-title">二级承接</div>
      <a class="nav-item" href="./weekly-report.html">周报与专题</a>
      <a class="nav-item" href="./peer-monitor.html">同业分析</a>
      <a class="nav-item" href="./policy-industry.html">政策与行业</a>
    </aside>
    <main class="main">
      <section class="panel">
        <h1 class="page-title">首页总览</h1>
        <div class="page-sub">当前页面承担总览、重点变化发现、业务维度导航、重点事项入口与周报承接入口。</div>
      </section>
      <section class="panel">
        <h2 class="section">主链路入口</h2>
        <div class="quick-links">
          <a class="quick-link" href="./deposit.html"><strong>存款深案例</strong><span>查看关键观察、对标变化与建议动作。</span></a>
          <a class="quick-link" href="./loan.html"><strong>贷款深案例</strong><span>查看贷款、定价及相关策略建议。</span></a>
          <a class="quick-link" href="./tracking.html"><strong>重点事项跟踪</strong><span>查看待确认事项、状态流转与下一步动作。</span></a>
          <a class="quick-link" href="./weekly-report.html"><strong>周报与专题</strong><span>查看周报草稿、规则说明与确认机制。</span></a>
        </div>
      </section>
      <section class="grid4" id="kpis"></section>
      <section class="twocol">
        <div class="panel">
          <h2 class="section">同业存款 Top 5</h2>
          <div class="table-wrap"><table><thead><tr><th>银行</th><th>口径</th><th class="num">当前值</th><th class="num">较上月</th><th class="num">较年初</th><th class="num">年初增幅</th></tr></thead><tbody id="deposit-top"></tbody></table></div>
        </div>
        <div class="panel">
          <h2 class="section">贷款利率低到高 Top 5</h2>
          <div class="table-wrap"><table><thead><tr><th>银行</th><th class="num">当月利率</th><th class="num">当年利率</th></tr></thead><tbody id="rate-top"></tbody></table></div>
        </div>
      </section>
      <section class="panel">
        <h2 class="section">偏好学习画像</h2>
        <div id="preference-box"></div>
      </section>
      <section class="panel">
        <h2 class="section">周报草稿预览</h2>
        <div class="mono" id="weekly-preview"></div>
      </section>
    </main>
  </div>
  <script src="./data/app-data.js"></script>
  <script>
    const data = window.AIRadarData || {};
    const dashboard = data.dashboard || {};
    const pref = data.preferenceProfile || {};
    const reviewStatus = data.reviewStatus || {};
    const kpiMap = [
      ['重点银行', dashboard.kpis?.focusBanks ?? '--'],
      ['待确认事项', reviewStatus.pending ?? '--'],
      ['已修改事项', reviewStatus.modified ?? '--'],
      ['已通过事项', reviewStatus.approved ?? '--'],
    ];
    document.getElementById('kpis').innerHTML = kpiMap.map(([k,v]) => `<div class="kpi-card"><div class="kpi-label">${k}</div><div class="kpi-value">${v}</div></div>`).join('');
    document.getElementById('deposit-top').innerHTML = (dashboard.depositTop5 || []).map(r => `<tr><td>${r.bank}</td><td>${r.metricGroup}</td><td class="num">${r.currentValueText}</td><td class="num">${r.monthChangeText}</td><td class="num">${r.yearChangeText}</td><td class="num">${r.yearGrowthText}</td></tr>`).join('');
    document.getElementById('rate-top').innerHTML = (dashboard.rateLowToHigh5 || []).map(r => `<tr><td>${r.bank}</td><td class="num">${r.monthlyRateText}</td><td class="num">${r.ytdRateText}</td></tr>`).join('');
    document.getElementById('preference-box').innerHTML = `
      <div class="card">
        <div><strong>累计确认样本：</strong>${pref.totalReviews || 0}</div>
        <div class="meta">重点偏好主题：${(pref.topThemes || []).join(' / ') || '暂无'}</div>
        <div>${(pref.guidance || []).join('<br/>') || '暂无偏好指引'}</div>
      </div>
    `;
    document.getElementById('weekly-preview').textContent = data.weeklyReportMarkdown || '暂无周报草稿';
  </script>
</body>
</html>
